name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build web application
        run: |
          ./gradlew :composeApp:jsBrowserProductionWebpack
          cp ./composeApp/src/webMain/resources/github-pages-index.html ./composeApp/build/kotlin-webpack/js/productionExecutable/index.html
          cp ./composeApp/src/webMain/resources/404.html ./composeApp/build/kotlin-webpack/js/productionExecutable/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./composeApp/build/kotlin-webpack/js/productionExecutable
          force_orphan: true
